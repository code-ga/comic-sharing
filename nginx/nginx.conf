events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Basic settings
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 0; # Unlimited body size for large uploads

    server {
        listen 80;

        # Drizzle Studio Proxy
        location /db/studio/ {
            proxy_pass http://drizzle-studio:4983/;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Forwarding headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable compression so sub_filter can work
            proxy_set_header Accept-Encoding "";

            # Handle redirects from the gateway
            proxy_redirect http://drizzle-studio:4983/ /db/studio/;

            # HTML/Asset path rewriting
            sub_filter_once off;
            sub_filter_types text/html text/css application/javascript;
            sub_filter 'src="/' 'src="/db/studio/';
            sub_filter 'href="/' 'href="/db/studio/';
            sub_filter 'from "/' 'from "/db/studio/';
            sub_filter 'url("/' 'url("/db/studio/';
            sub_filter 'url(\'/' 'url(\'/db/studio/';
        }

        # Backend API Proxy
        location / {
            proxy_pass http://backend:3001;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
