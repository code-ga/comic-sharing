
services:
  postgres:
    image: postgres:16-alpine
    container_name: comic-sharing-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - comic-sharing-network
    restart: unless-stopped


  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: comic-sharing-backend
    image: tritranduc11/comic-sharing-backend:latest
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - comic-sharing-network
    restart: unless-stopped
    env_file:
      - .env
      - backend/.env

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: comic-sharing-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - comic-sharing-network
    restart: unless-stopped
    environment:
      BACKEND_TARGET_URL: http://backend:3001
    env_file:
      - .env
      - frontend/.env

  drizzle-studio:
    image: ghcr.io/drizzle-team/gateway:latest
    container_name: comic-sharing-drizzle-studio
    environment:
      - PORT=4983
      - MASTERPASS=${MASTERPASS}
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - studio-data:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - comic-sharing-network
    env_file:
      - .env
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: comic-sharing-nginx
    ports:
      - "${BACKEND_PORT:-3001}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - drizzle-studio
    networks:
      - comic-sharing-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  studio-data:
    driver: local

networks:
  comic-sharing-network:
    driver: bridge
